# ─── Backend Nginx (Standalone mode only) ────────────────────────────────────
# Used when backend is deployed on its own server (docker-compose.standalone.yml)
# For same-server deployment, this file is NOT used — sat_front nginx handles routing.
# ─────────────────────────────────────────────────────────────────────────────

upstream django {
    server web:8000;
}

# ── HTTP → HTTPS + certbot challenge ─────────────────────────────────────────
server {
    listen 80;
    server_name nodir.exambridge.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — Django admin + API ────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name nodir.exambridge.uz;

    ssl_certificate     /etc/letsencrypt/live/nodir.exambridge.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nodir.exambridge.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 100M;

    # Static files (Django collectstatic)
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # Django app
    location / {
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }
}
